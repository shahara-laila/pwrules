# ============================================================================
# train.yaml  —  fine-tuning + generation hyperparameters (NOT frozen).
# Tune these freely; the frozen evaluation contract lives in protocol.yaml.
# ============================================================================

# Base model — MODEL-AGNOSTIC. Default is a small Qwen3 instruct variant; override
# freely. Code must read this, never hard-code a model id.
model_name: Qwen/Qwen3-0.6B
max_seq_length: 1024

# 4-bit QLoRA adapter config.
qlora:
  load_in_4bit: true
  r: 16
  lora_alpha: 32
  lora_dropout: 0.05
  bias: none
  # Attention + MLP projections.
  target_modules:
    - q_proj
    - k_proj
    - v_proj
    - o_proj
    - gate_proj
    - up_proj
    - down_proj

# Training params.
training:
  epochs: 3
  learning_rate: 2.0e-4
  per_device_train_batch_size: 16
  gradient_accumulation_steps: 4
  warmup_ratio: 0.03
  weight_decay: 0.01
  lr_scheduler_type: cosine
  logging_steps: 10
  eval_steps: 50
  save_steps: 50
  early_stopping:
    enabled: true
    patience: 3
    metric: eval_loss
  # Resume from a checkpoint dir to survive the Kaggle 12h cap.
  resume_from_checkpoint: null

# Generation / inference params (used in Phase 6).
generation:
  budget: 10000        # number of rules to generate
  temperature: 0.8
  top_p: 0.95
  max_new_tokens: 64
  do_sample: true

# Determinism — keep in sync with protocol.yaml seed.
seed: 1337
